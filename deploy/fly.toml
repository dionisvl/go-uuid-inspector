# fly.toml app configuration file generated for my-hello-fly-wild-glitter-7240 on 2025-10-11T20:26:47+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'my-hello-fly-wild-glitter-7240'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'
  [build.args]
    GO_VERSION = '1.25'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
